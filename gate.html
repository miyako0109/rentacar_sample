<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex">
    <title>認証｜サンプルレンタカー</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500&family=Shippori+Mincho:wght@500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .gate {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            background: linear-gradient(135deg, var(--color-brand-900, #2d3631) 0%, var(--color-brand-600, #4a574f) 100%);
        }
        .gate-inner {
            background: var(--color-white, #fff);
            padding: 2.5rem;
            border-radius: 8px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            width: 100%;
            max-width: 360px;
        }
        .gate-title {
            font-family: var(--font-serif, 'Shippori Mincho', serif);
            font-size: 1.25rem;
            color: var(--color-brand-900, #2d3631);
            text-align: center;
            margin-bottom: 1.5rem;
        }
        .gate-form label {
            display: block;
            font-size: 0.875rem;
            color: var(--color-gray-600, #4b5563);
            margin-bottom: 0.5rem;
        }
        .gate-form input[type="password"] {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1px solid var(--color-gray-300, #d1d5db);
            border-radius: 4px;
            font-size: 1rem;
            box-sizing: border-box;
        }
        .gate-form input:focus {
            outline: none;
            border-color: var(--color-accent, #b89c5a);
        }
        .gate-form .gate-error {
            color: #dc2626;
            font-size: 0.875rem;
            margin-top: 0.5rem;
            display: none;
        }
        .gate-form .gate-error.show { display: block; }
        .gate-form button {
            width: 100%;
            margin-top: 1.5rem;
            padding: 0.75rem 1.5rem;
            background: var(--color-accent, #b89c5a);
            color: var(--color-white, #fff);
            border: none;
            border-radius: 4px;
            font-size: 1rem;
            cursor: pointer;
            font-weight: 500;
        }
        .gate-form button:hover { opacity: 0.9; }
    </style>
</head>
<body class="gate">
    <div class="gate-inner">
        <h1 class="gate-title">Lumina Home</h1>
        <p class="gate-title" style="font-size: 0.9rem; margin-bottom: 1rem; font-family: var(--font-sans, 'Noto Sans JP', sans-serif);">閲覧にはパスワードが必要です</p>
        <form id="gate-form" class="gate-form" autocomplete="off">
            <label for="gate-pw">パスワード</label>
            <input type="password" id="gate-pw" name="password" placeholder="パスワードを入力" required autofocus>
            <p id="gate-error" class="gate-error">パスワードが正しくありません</p>
            <button type="submit">送信</button>
        </form>
    </div>
    <script>
        // ★ パスワード変更: ここを任意の文字列に書き換えてから push してください
        var GATE_PASSWORD = 'renta2025';

        (function () {
            if (sessionStorage.getItem('gate_ok')) {
                window.location.replace('index.html');
                return;
            }
            var form = document.getElementById('gate-form');
            var input = document.getElementById('gate-pw');
            var err = document.getElementById('gate-error');
            form.addEventListener('submit', function (e) {
                e.preventDefault();
                err.classList.remove('show');
                if (input.value === GATE_PASSWORD) {
                    sessionStorage.setItem('gate_ok', '1');
                    window.location.replace('index.html');
                } else {
                    err.classList.add('show');
                    input.value = '';
                    input.focus();
                }
            });
        })();
    </script>
</body>
</html>
